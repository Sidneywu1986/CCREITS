version: '3.8'

services:
  milvus:
    image: milvusdb/milvus:v3.1.0
    container_name: milvus-standalone
    environment:
      ETCD_USE_EMBED: true
      COMMON_STYPE: milvus
    ports:
      - "19530:19530"   # Milvus service port
      - "9091:9091"     # Health check port
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - milvus-network

volumes:
  milvus_data:
    driver: local

networks:
  milvus-network:
    driver: bridge
