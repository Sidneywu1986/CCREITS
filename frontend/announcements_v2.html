<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告追踪 - REITs数据平台</title>
    <link rel="stylesheet" href="./css/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/common.css">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .announcement-card {
            transition: all 0.2s ease;
        }
        .announcement-card:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-color: #3b82f6;
        }

        .pdf-icon {
            color: #dc2626;
        }
        .external-link:hover {
            color: #2563eb;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="h-[60px] bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-none z-40">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-lg flex items-center justify-center text-white font-bold text-sm">R</div>
            <span class="font-bold text-gray-900 text-lg tracking-tight">REITs数据平台</span>
            <nav class="hidden md:flex items-center gap-1 ml-6">
                <a href="./market.html" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-all">市场</a>
                <a href="./fund-detail.html" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-all">详情</a>
                <a href="./announcements.html" class="px-3 py-1.5 text-sm font-medium text-blue-600 bg-blue-50 rounded-lg">公告</a>
                <a href="./portfolio.html" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-all">自选</a>
            </nav>
        </div>
        
        <div class="flex-1 max-w-xl mx-4 md:mx-8">
            <div class="relative">
                <input type="text" id="search-input" placeholder="搜索公告标题、基金代码..." 
                    class="w-full pl-10 pr-4 py-2 bg-gray-100 border border-transparent rounded-lg text-sm focus:outline-none focus:bg-white focus:border-blue-500 transition-all">
                <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="refreshAnnouncements()" class="p-2 text-gray-500 hover:text-blue-600" title="刷新公告">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="flex-1 overflow-auto">
        <div class="max-w-7xl mx-auto p-4 md:p-6 space-y-5">
            
            <!-- 统计卡片 -->
            <div class="grid grid-cols-4 gap-4">
                <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                    <div class="text-sm text-gray-500 mb-1">全部公告</div>
                    <div class="text-2xl font-bold text-gray-900" id="stat-total">0</div>
                </div>
                <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                    <div class="text-sm text-gray-500 mb-1">上交所</div>
                    <div class="text-2xl font-bold text-blue-600" id="stat-sse">0</div>
                </div>
                <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                    <div class="text-sm text-gray-500 mb-1">深交所</div>
                    <div class="text-2xl font-bold text-purple-600" id="stat-szse">0</div>
                </div>
                <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                    <div class="text-sm text-gray-500 mb-1">今日更新</div>
                    <div class="text-2xl font-bold text-green-600" id="stat-today">0</div>
                </div>
            </div>

            <!-- 筛选栏 -->
            <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                <div class="flex flex-wrap items-center gap-4">
                    <!-- 分类筛选 -->
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-gray-500">分类：</span>
                        <div class="flex gap-1 flex-wrap" id="category-filters">
                            <button onclick="filterByCategory('all')" class="cat-btn px-3 py-1.5 bg-blue-600 text-white text-xs font-medium rounded-lg">全部</button>
                            <button onclick="filterByCategory('operation')" class="cat-btn px-3 py-1.5 bg-gray-100 text-gray-700 text-xs font-medium rounded-lg hover:bg-gray-200">运营</button>
                            <button onclick="filterByCategory('dividend')" class="cat-btn px-3 py-1.5 bg-gray-100 text-gray-700 text-xs font-medium rounded-lg hover:bg-gray-200">分红</button>
                            <button onclick="filterByCategory('inquiry')" class="cat-btn px-3 py-1.5 bg-gray-100 text-gray-700 text-xs font-medium rounded-lg hover:bg-gray-200">问询</button>
                            <button onclick="filterByCategory('financial')" class="cat-btn px-3 py-1.5 bg-gray-100 text-gray-700 text-xs font-medium rounded-lg hover:bg-gray-200">财报</button>
                            <button onclick="filterByCategory('listing')" class="cat-btn px-3 py-1.5 bg-gray-100 text-gray-700 text-xs font-medium rounded-lg hover:bg-gray-200">发行</button>
                        </div>
                    </div>

                    <!-- 交易所筛选 -->
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-gray-500">交易所：</span>
                        <select id="exchange-filter" onchange="applyFilters()" class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                            <option value="all">全部</option>
                            <option value="SSE">上交所</option>
                            <option value="SZSE">深交所</option>
                        </select>
                    </div>

                    <!-- 时间筛选 -->
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-gray-500">时间：</span>
                        <select id="time-filter" onchange="applyFilters()" class="px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                            <option value="7">近7天</option>
                            <option value="30">近30天</option>
                            <option value="90">近3个月</option>
                            <option value="0">全部</option>
                        </select>
                    </div>

                    <div class="ml-auto text-sm text-gray-500">
                        共 <span id="filter-count" class="font-bold text-blue-600">0</span> 条公告
                    </div>
                </div>
            </div>

            <!-- 公告列表 -->
            <div id="announcement-list" class="space-y-3">
                <!-- 动态生成 -->
            </div>

            <!-- 空状态 -->
            <div id="empty-state" class="hidden">
                <div class="bg-white rounded-xl border border-gray-200 p-12 flex flex-col items-center justify-center text-center">
                    <div class="text-5xl mb-4">📭</div>
                    <h3 class="text-lg font-medium text-gray-900 mb-1">暂无公告</h3>
                    <p class="text-sm text-gray-500">请稍后再试或调整筛选条件</p>
                </div>
            </div>
        </div>
    </main>

    <script src="./js/common.js"></script>
    <script src="./js/api.js"></script>
    <script>
        // 分类配置
        const CATEGORY_CONFIG = {
            operation: { name: '运营', class: 'bg-emerald-100 text-emerald-700' },
            dividend: { name: '分红', class: 'bg-rose-100 text-rose-700' },
            inquiry: { name: '问询', class: 'bg-amber-100 text-amber-700' },
            financial: { name: '财报', class: 'bg-blue-100 text-blue-700' },
            listing: { name: '发行', class: 'bg-purple-100 text-purple-700' },
            disclosure: { name: '披露', class: 'bg-gray-100 text-gray-700' },
            other: { name: '其他', class: 'bg-gray-100 text-gray-600' }
        };

        // 状态
        let allAnnouncements = [];
        let filteredAnnouncements = [];
        let currentCategory = 'all';
        let currentExchange = 'all';
        let currentTimeDays = 7;
        let searchKeyword = '';

        // 初始化
        async function init() {
            await loadAnnouncements();
            setupEventListeners();
        }

        // 加载公告数据
        async function loadAnnouncements() {
            try {
                const response = await fetch('/api/announcements?limit=500');
                const data = await response.json();
                
                if (data.success) {
                    allAnnouncements = data.data || [];
                    applyFilters();
                    updateStats();
                }
            } catch (error) {
                console.error('加载公告失败:', error);
                showEmptyState();
            }
        }

        // 应用筛选
        function applyFilters() {
            filteredAnnouncements = allAnnouncements.filter(item => {
                // 分类筛选
                if (currentCategory !== 'all' && item.category !== currentCategory) {
                    return false;
                }
                
                // 交易所筛选
                if (currentExchange !== 'all' && item.exchange !== currentExchange) {
                    return false;
                }
                
                // 时间筛选
                if (currentTimeDays > 0) {
                    const itemDate = new Date(item.publish_date);
                    const cutoffDate = new Date();
                    cutoffDate.setDate(cutoffDate.getDate() - currentTimeDays);
                    if (itemDate < cutoffDate) {
                        return false;
                    }
                }
                
                // 搜索筛选
                if (searchKeyword) {
                    const keyword = searchKeyword.toLowerCase();
                    const matchTitle = item.title && item.title.toLowerCase().includes(keyword);
                    const matchCode = item.fund_code && item.fund_code.includes(keyword);
                    if (!matchTitle && !matchCode) {
                        return false;
                    }
                }
                
                return true;
            });
            
            renderAnnouncements();
            updateFilterCount();
        }

        // 渲染公告列表
        function renderAnnouncements() {
            const container = document.getElementById('announcement-list');
            
            if (filteredAnnouncements.length === 0) {
                showEmptyState();
                return;
            }
            
            hideEmptyState();
            
            container.innerHTML = filteredAnnouncements.map(item => {
                const category = CATEGORY_CONFIG[item.category] || CATEGORY_CONFIG.other;
                const exchangeBadge = item.exchange === 'SSE' 
                    ? '<span class="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs rounded">上交所</span>'
                    : '<span class="px-2 py-0.5 bg-purple-100 text-purple-700 text-xs rounded">深交所</span>';
                
                // 构建链接
                const detailUrl = item.source_url || '#';
                const pdfUrl = item.pdf_url || detailUrl;
                
                return `
                    <div class="announcement-card bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="px-2 py-0.5 ${category.class} text-xs font-medium rounded">${category.name}</span>
                                    ${exchangeBadge}
                                    ${item.fund_code ? `<span class="px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded mono">${item.fund_code}</span>` : ''}
                                    <span class="text-xs text-gray-400">${item.publish_date}</span>
                                </div>
                                <h3 class="text-base font-medium text-gray-900 mb-1 line-clamp-2">${escapeHtml(item.title)}</h3>
                                <p class="text-sm text-gray-500 line-clamp-2">${escapeHtml(item.summary || '')}</p>
                            </div>
                            <div class="flex items-center gap-2 flex-none">
                                <a href="${pdfUrl}" target="_blank" class="flex items-center gap-1 px-3 py-1.5 bg-red-50 text-red-600 text-sm rounded-lg hover:bg-red-100 transition-all" title="下载PDF">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/>
                                    </svg>
                                    PDF
                                </a>
                                <a href="${detailUrl}" target="_blank" class="flex items-center gap-1 px-3 py-1.5 bg-gray-50 text-gray-600 text-sm rounded-lg hover:bg-gray-100 transition-all external-link" title="查看原文">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                                    </svg>
                                    原文
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 更新统计
        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            
            document.getElementById('stat-total').textContent = allAnnouncements.length;
            document.getElementById('stat-sse').textContent = allAnnouncements.filter(a => a.exchange === 'SSE').length;
            document.getElementById('stat-szse').textContent = allAnnouncements.filter(a => a.exchange === 'SZSE').length;
            document.getElementById('stat-today').textContent = allAnnouncements.filter(a => a.publish_date === today).length;
        }

        // 更新筛选计数
        function updateFilterCount() {
            document.getElementById('filter-count').textContent = filteredAnnouncements.length;
        }

        // 筛选函数
        function filterByCategory(category) {
            currentCategory = category;
            
            // 更新按钮样式
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-gray-100', 'text-gray-700');
            });
            event.target.classList.remove('bg-gray-100', 'text-gray-700');
            event.target.classList.add('bg-blue-600', 'text-white');
            
            applyFilters();
        }

        // 刷新公告
        async function refreshAnnouncements() {
            const btn = event.target.closest('button');
            btn.classList.add('animate-spin');
            
            try {
                // 调用爬虫API
                await fetch('/api/announcements/crawl', { method: 'POST' });
                await loadAnnouncements();
            } catch (error) {
                console.error('刷新失败:', error);
            } finally {
                btn.classList.remove('animate-spin');
            }
        }

        // 工具函数
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showEmptyState() {
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('announcement-list').innerHTML = '';
        }

        function hideEmptyState() {
            document.getElementById('empty-state').classList.add('hidden');
        }

        function setupEventListeners() {
            // 搜索
            document.getElementById('search-input').addEventListener('input', (e) => {
                searchKeyword = e.target.value.trim();
                applyFilters();
            });
            
            // 交易所筛选
            document.getElementById('exchange-filter').addEventListener('change', (e) => {
                currentExchange = e.target.value;
                applyFilters();
            });
            
            // 时间筛选
            document.getElementById('time-filter').addEventListener('change', (e) => {
                currentTimeDays = parseInt(e.target.value);
                applyFilters();
            });
        }

        // 初始化
        init();
    </script>
</body>
</html>
