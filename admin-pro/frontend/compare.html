<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金对比 - REITs数据平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/common.css">
    <script src="./js/app-core.js?v=1"></script>
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .compare-card { transition: all 0.2s ease; }
        .compare-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); }

        .highlight-best {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            font-weight: 600;
            position: relative;
        }
        .highlight-best .trophy { margin-left: 4px; }
        .highlight-worst { background: #fee2e2; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease forwards; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="h-[60px] bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-none z-40">
        <div class="flex items-center gap-4">

            <span class="font-bold text-gray-900 text-lg tracking-tight">REITs数据平台</span>
            <nav class="hidden md:flex items-center gap-0.5 ml-4">
                <a href="./market.html" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-all">市场</a>
                <a href="./fund-detail.html" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-all">详情</a>
                <a href="./ai-chat.html" class="px-3 py-1.5 text-sm font-medium text-purple-600 bg-purple-50 rounded-lg transition-all flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-pulse"></span>

                <a href="./portfolio.html" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-all">自选</a>
                <a href="./compare.html" class="px-3 py-1.5 text-sm font-medium text-blue-600 bg-blue-50 rounded-lg">对比</a>
                <a href="./research-center.html" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-all">投研中心</a>
                <a href="./dividend-calendar.html" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-all">分红</a>
                <a href="./research-center.html" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-all">投研中心</a>

        <div class="w-64 mx-2">
            <div class="relative">
                <input type="text" id="compare-search" placeholder="搜索基金代码或名称..." data-v="2"

                <!-- 搜索结果下拉 -->

            </div>
        </div>

        <div class="flex items-center gap-3 md:gap-4">
            <button class="p-2 text-gray-500 hover:text-gray-700 relative" onclick="window.location.href='./announcements.html'">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                </svg>
                <span id="nav-badge" class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full hidden"></span>
            </button>
            <button onclick="window.location.href='./portfolio.html'" class="hidden sm:flex px-4 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-sm font-medium rounded-lg hover:shadow-lg hover:shadow-blue-200 transition-all items-center gap-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                自选
            </button>
            <button class="flex items-center gap-2 text-sm text-gray-600 hover:text-gray-900">
                <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-xs">登录</div>
            </button>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="flex-1 overflow-auto">
        <div class="max-w-7xl mx-auto p-4 md:p-6 space-y-5">

            <!-- 空状态 -->
            <div id="empty-state" class="hidden bg-white rounded-xl border border-gray-200 shadow-sm text-center py-16 animate-fade-in">
                <div class="text-6xl mb-4">⚖️</div>
                <div class="text-lg font-medium text-gray-700 mb-1">暂无对比基金</div>
                <div class="text-sm text-gray-400 mb-6">从市场页面添加基金，或在上方搜索添加</div>
                <a href="./market.html" class="inline-flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:shadow-lg hover:shadow-blue-200 transition-all">
                    去市场添加

            </div>

            <!-- 有内容时显示 -->
            <div id="content-area" class="space-y-5 hidden">
                <!-- 对比卡片区 -->
                <div id="compare-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>

                <!-- 雷达图 -->
                <div class="bg-white rounded-xl border border-gray-200 p-4 md:p-5 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="text-base font-semibold text-gray-900">六维专业评估雷达图</h2>
                        <div class="text-xs text-gray-400">估值回报 · 运营质量 · 财务健康 · 资产质量 · 成长潜力 · 市场流动性</div>
                    </div>
                    <div id="radar-chart" class="h-[360px]"></div>
                </div>

                <!-- 专业指标对比表格 -->
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                    <div class="flex items-center justify-between px-4 md:px-5 py-4 border-b border-gray-200">
                        <div class="flex items-center gap-3">
                            <h2 class="text-base font-semibold text-gray-900">REITs专业指标对比</h2>
                            <span class="text-xs px-2 py-0.5 bg-blue-100 text-blue-700 rounded">15项核心指标</span>
                            <span class="text-xs text-gray-400">覆盖估值·运营·财务·资产·成长·流动性六大维度</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button id="highlight-best-btn" class="px-3 py-1.5 text-xs font-medium bg-yellow-100 text-yellow-700 rounded-lg hover:bg-yellow-200 transition-all">
                                高亮最优
                            </button>
                            <button id="reset-highlight-btn" class="px-3 py-1.5 text-xs font-medium bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition-all">
                                重置
                            </button>
                            <div class="w-px h-4 bg-gray-300 mx-1"></div>
                            <button id="export-excel-btn" class="px-3 py-1.5 text-xs font-medium bg-white border border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-all">
                                导出Excel
                            </button>
                            <button id="export-pdf-btn" class="px-3 py-1.5 text-xs font-medium bg-white border border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-all">
                                导出PDF
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full" id="compare-table">
                            <thead id="table-header" class="bg-gray-50 border-b border-gray-200"></thead>
                            <tbody id="table-body" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="./js/common.js"></script>
    <script src="./js/api.js"></script>
    <script>
        // 状态
        let compareList = [];
        let highlightBest = false;
        let radarChartInstance = null;

        // 颜色配置
        const CARD_COLORS = [
            { name: 'blue', border: 'border-blue-500', bar: 'bg-blue-500' },
            { name: 'green', border: 'border-green-500', bar: 'bg-green-500' },
            { name: 'purple', border: 'border-purple-500', bar: 'bg-purple-500' },
            { name: 'orange', border: 'border-orange-500', bar: 'bg-orange-500' }
        ];

        // 初始化
        // 全局基金数据（API优先，降级Mock）
        let fundsData = ALL_FUNDS || [];
        
        // 异步加载基金数据
        async function loadFunds() {
            try {
                console.log('🔄 正在从API加载基金数据...');
                const response = await REITS_API.getFunds();
                if (response.data && response.data.length > 0) {
                    fundsData = response.data;
                    console.log('✅ API数据加载成功:', fundsData.length, '只基金');
                    showDataSource('API');
                }
            } catch (error) {
                console.warn('⚠️ API加载失败，使用Mock数据:', error.message);
                fundsData = ALL_FUNDS || [];
                showDataSource('Mock');
            }
            // 用 ALL_FUNDS 补齐 API 数据缺失的字段（price/change/sector 等）
            fundsData = fundsData.map(f => {
                const mock = ALL_FUNDS.find(m => m.code === f.code);
                if (!mock) return f;
                return {
                    ...mock,
                    ...f,
                    price: f.price !== undefined ? f.price : mock.price,
                    change: f.change !== undefined ? f.change : mock.change,
                    sector: f.sector || mock.sector,
                    sectorName: f.sectorName || mock.sectorName,
                    remainingYears: f.remainingYears || mock.remainingYears,
                    yield: f.yield !== undefined ? f.yield : mock.yield,
                    nav: f.nav !== undefined ? f.nav : mock.nav,
                    debt: f.debt !== undefined ? f.debt : mock.debt,
                    marketCap: f.marketCap !== undefined ? f.marketCap : mock.marketCap
                };
            });
        }
        
        // 显示数据来源
        function showDataSource(source) {
            const indicator = document.createElement('div');
            indicator.className = 'fixed bottom-20 right-4 text-xs px-3 py-1.5 rounded-full z-50 transition-all ' + 
                (source === 'API' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700');
            indicator.innerHTML = source === 'API' 
                ? '🟢 实时数据（API）' 
                : '🟡 模拟数据（Mock）';
            document.body.appendChild(indicator);
            setTimeout(() => { indicator.style.opacity = '0.5'; }, 3000);
        }
        
        // 修改getFundData使用fundsData
        const originalGetFundData = getFundData;
        getFundData = function(code) {
            const fund = fundsData.find(f => f.code === code);
            if (!fund) return null;
            
            // 复用原有的指标计算逻辑
            const isProperty = ['logistics', 'industrial', 'consumer', 'commercial', 'housing', 'datacenter'].includes(fund.sector);
            const isTransport = fund.sector === 'transport';
            const isEco = ['eco', 'water', 'energy'].includes(fund.sector);
            
            const pNav = fund.nav ? (fund.price / fund.nav).toFixed(2) : '1.00';
            const capRate = (parseFloat(pNav) && fund.yield) ? (fund.yield / parseFloat(pNav)).toFixed(2) : '0.00';
            
            const occupancy = isProperty ? (85 + Math.random() * 12).toFixed(1) : null;
            const traffic = isTransport ? (10000 + Math.random() * 50000).toFixed(0) : null;
            const wale = isProperty ? (3 + Math.random() * 4).toFixed(1) : null;
            const remaining = fund.remainingYears ? fund.remainingYears.replace('年', '').replace('永久', '99') : '99';
            
            const interestCover = (2 + Math.random() * 3).toFixed(1);
            const floatDebtRatio = (20 + Math.random() * 40).toFixed(1);
            
            const irr = isTransport ? (8 + Math.random() * 4).toFixed(1) : null;
            const realYield = (fund.yield * (0.85 + Math.random() * 0.15)).toFixed(2);
            
            const expansionScore = Math.floor(60 + Math.random() * 30);
            
            const turnoverRate = (0.5 + Math.random() * 2).toFixed(2);
            const volatility = (15 + Math.random() * 20).toFixed(1);
            
            const rentCollection = isProperty ? (95 + Math.random() * 4).toFixed(1) : null;
            const tenantConcentration = isProperty ? (20 + Math.random() * 30).toFixed(1) : null;
            
            return {
                ...fund,
                pNav: parseFloat(pNav),
                capRate: parseFloat(capRate),
                occupancyRate: occupancy ? parseFloat(occupancy) : null,
                trafficVolume: traffic ? parseInt(traffic) : null,
                wale: wale ? parseFloat(wale) : null,
                remainingYearsNum: parseFloat(remaining) || 99,
                interestCover: parseFloat(interestCover),
                irr: irr ? parseFloat(irr) : null,
                realYield: parseFloat(realYield),
                expansionScore,
                turnoverRate: parseFloat(turnoverRate),
                volatility: parseFloat(volatility),
                rentCollectionRate: rentCollection ? parseFloat(rentCollection) : null,
                tenantConcentration: tenantConcentration ? parseFloat(tenantConcentration) : null,
                floatDebtRatio: parseFloat(floatDebtRatio)
            };
        };
        
        async function init() {
            // 先加载数据
            await loadFunds();
            
            // 检查是否从AI中心跳转过来
            const urlParams = new URLSearchParams(window.location.search);
            const fromAI = urlParams.get('from') === 'ai';
            const aiSelected = localStorage.getItem('ai_selected_funds');
            
            if (fromAI && aiSelected) {
                // 从AI中心带过来的基金列表
                const selectedCodes = JSON.parse(aiSelected);
                if (selectedCodes.length > 0) {
                    compareList = selectedCodes.map(code => {
                        const fund = ALL_FUNDS.find(f => f.code === code);
                        return { code, name: fund ? fund.name : code };
                    });
                    saveCompareList();
                    localStorage.removeItem('ai_selected_funds'); // 清除临时数据
                    REITS.showToast(`已从AI投研导入 ${compareList.length} 只基金`, 'success');
                    renderPage();
                } else {
                    loadCompareList();
                }
            } else {
                const stored = sessionStorage.getItem('compareList');
                const marketCompare = localStorage.getItem('reits_compare');
                if (marketCompare && marketCompare !== '[]') {
                    // 从市场页跳转，优先使用市场带来的对比数据
                    compareList = JSON.parse(marketCompare);
                    saveCompareList();
                    REITS.showToast(`已从市场导入 ${compareList.length} 只基金`, 'success');
                    renderPage();
                } else if (!stored || stored === '[]') {
                    // 默认加载2只热门基金做示例
                    compareList = [
                        { code: '508056', name: '中金普洛斯REIT', isDefault: true },
                        { code: '508008', name: '华夏中国交建REIT', isDefault: true }
                    ];
                    saveCompareList();
                    REITS.showToast('已默认加载2只热门基金示例', 'success');
                    renderPage();
                } else {
                    loadCompareList();
                }
            }
            
            bindEvents();
            if (Math.random() > 0.5) {
                const badge = document.getElementById('nav-badge');
                if (badge) badge.classList.remove('hidden');
            }
        }

        // 加载对比列表
        function loadCompareList() {
            // 检查是否从AI中心跳转过来
            const urlParams = new URLSearchParams(window.location.search);
            const fromAI = urlParams.get('from') === 'ai';
            const aiSelected = localStorage.getItem('ai_selected_funds');
            
            if (fromAI && aiSelected) {
                // 从AI中心带过来的基金列表
                const selectedCodes = JSON.parse(aiSelected);
                if (selectedCodes.length > 0) {
                    compareList = selectedCodes.map(code => {
                        const fund = ALL_FUNDS.find(f => f.code === code);
                        return { code, name: fund ? fund.name : code };
                    });
                    saveCompareList();
                    localStorage.removeItem('ai_selected_funds');
                    REITS.showToast(`已从AI投研导入 ${compareList.length} 只基金`, 'success');
                    renderPage();
                    return;
                }
            }
            
            // 检查sessionStorage中是否有保存的列表
            const stored = sessionStorage.getItem('compareList');
            if (stored) {
                compareList = JSON.parse(stored);
            } else {
                // 检查是否从市场页面跳转过来（使用 reits_compare）
                const marketCompare = localStorage.getItem('reits_compare');
                if (marketCompare) {
                    compareList = JSON.parse(marketCompare);
                    saveCompareList();
                    REITS.showToast(`已从市场导入 ${compareList.length} 只基金`, 'success');
                } else {
                    // 默认加载2只热门基金做示例
                    compareList = [
                        { code: '508056', name: '中金普洛斯REIT', isDefault: true },
                        { code: '508008', name: '华夏中国交建REIT', isDefault: true }
                    ];
                    saveCompareList();
                    REITS.showToast('已默认加载2只热门基金，您可以添加或替换', 'info');
                }
            }
            renderPage();
        }

        function saveCompareList() {
            sessionStorage.setItem('compareList', JSON.stringify(compareList));
        }

        function getFundData(code) {
            const fund = (typeof ALL_FUNDS !== 'undefined') ? ALL_FUNDS.find(f => f.code === code) : null;
            if (!fund) return null;
            
            // 生成15项专业指标数据
            const isProperty = ['logistics', 'industrial', 'consumer', 'commercial', 'housing', 'datacenter'].includes(fund.sector);
            const isTransport = fund.sector === 'transport';
            const isEco = ['eco', 'water', 'energy'].includes(fund.sector);
            
            // 基础计算
            const pNav = (fund.price / fund.nav).toFixed(2);
            const capRate = (fund.yield / pNav).toFixed(2); // 隐含资本化率简化计算
            
            // 运营指标（根据资产类型区分）
            const occupancy = isProperty ? (85 + Math.random() * 12).toFixed(1) : null; // 出租率 85-97%
            const traffic = isTransport ? (10000 + Math.random() * 50000).toFixed(0) : null; // 车流量
            const wale = isProperty ? (3 + Math.random() * 4).toFixed(1) : null; // WALE 3-7年
            const remaining = fund.remainingYears.replace('年', '').replace('永久', '99');
            
            // 财务指标
            const interestCover = (2 + Math.random() * 3).toFixed(1); // 利息覆盖倍数 2-5倍
            const floatDebtRatio = (20 + Math.random() * 40).toFixed(1); // 浮动利率债务占比 20-60%
            
            // 回报指标
            const irr = isTransport ? (8 + Math.random() * 4).toFixed(1) : null; // IRR 8-12%（经营权）
            const realYield = (fund.yield * (0.85 + Math.random() * 0.15)).toFixed(2); // 真实分派率
            
            // 成长指标
            const expansionScore = Math.floor(60 + Math.random() * 30); // 扩募能力评分 60-90
            
            // 市场指标
            const turnoverRate = (0.5 + Math.random() * 2).toFixed(2); // 日均换手率 0.5-2.5%
            const volatility = (15 + Math.random() * 20).toFixed(1); // 年化波动率 15-35%
            
            // 运营质量
            const rentCollection = isProperty ? (95 + Math.random() * 4).toFixed(1) : null; // 租金收缴率
            const tenantConcentration = isProperty ? (20 + Math.random() * 30).toFixed(1) : null; // 租户集中度（Top5占比）
            
            return {
                ...fund,
                // P0 核心指标
                pNav: parseFloat(pNav),
                capRate: parseFloat(capRate),
                occupancyRate: occupancy ? parseFloat(occupancy) : null,
                trafficVolume: traffic ? parseInt(traffic) : null,
                wale: wale ? parseFloat(wale) : null,
                remainingYearsNum: parseFloat(remaining) || 99,
                interestCover: parseFloat(interestCover),
                
                // P1 重要指标
                irr: irr ? parseFloat(irr) : null,
                realYield: parseFloat(realYield),
                expansionScore,
                turnoverRate: parseFloat(turnoverRate),
                volatility: parseFloat(volatility),
                
                // P2 辅助指标
                rentCollectionRate: rentCollection ? parseFloat(rentCollection) : null,
                tenantConcentration: tenantConcentration ? parseFloat(tenantConcentration) : null,
                floatDebtRatio: parseFloat(floatDebtRatio)
            };
        }

        // 计算六维专业指标（与15项指标表对齐）
        function calculateDimensions(fund) {
            // 1. 估值与回报 (30%: 分派率 + P/NAV合理性 + 资本化率)
            const yieldScore = Math.min(100, (fund.yield / 8) * 100); // 8%为满分基准
            const pNavScore = fund.pNav <= 1.2 ? Math.max(0, 100 - (fund.pNav - 0.8) * 50) : Math.max(0, 100 - (fund.pNav - 1) * 100);
            const capRateScore = Math.min(100, (fund.capRate / 8) * 100);
            const valuationReturn = Math.round((yieldScore * 0.4 + pNavScore * 0.3 + capRateScore * 0.3));
            
            // 2. 运营质量 (25%: 出租率/车流量 + WALE + 收缴率)
            const occupancyScore = fund.occupancyRate ? fund.occupancyRate : (fund.trafficVolume ? Math.min(100, fund.trafficVolume / 50000 * 100) : 70);
            const waleScore = fund.wale ? Math.min(100, fund.wale * 15) : Math.min(100, fund.remainingYearsNum * 5);
            const collectionScore = fund.rentCollectionRate || 95;
            const operationQuality = Math.round((occupancyScore * 0.5 + waleScore * 0.3 + collectionScore * 0.2));
            
            // 3. 财务健康 (20%: 利息覆盖 + 负债率 + 浮动利率占比)
            const interestCoverScore = Math.min(100, fund.interestCover * 25); // 4倍为满分
            const debtScore = Math.max(0, 100 - fund.debt);
            const floatDebtScore = Math.max(0, 100 - fund.floatDebtRatio);
            const financialHealth = Math.round((interestCoverScore * 0.5 + debtScore * 0.3 + floatDebtScore * 0.2));
            
            // 4. 资产质量 (10%: 资产成新率 + 租户集中度)
            const assetAgeScore = 85 + Math.random() * 15; // 模拟资产成新率
            const concentrationScore = fund.tenantConcentration ? Math.max(0, 100 - fund.tenantConcentration) : 80;
            const assetQuality = Math.round((assetAgeScore * 0.6 + concentrationScore * 0.4));
            
            // 5. 成长潜力 (10%: 扩募能力 + IRR)
            const expansionScore = fund.expansionScore;
            const irrScore = fund.irr ? Math.min(100, fund.irr * 10) : 70;
            const growthPotential = Math.round((expansionScore * 0.6 + irrScore * 0.4));
            
            // 6. 市场与流动性 (5%: 换手率 + 波动率)
            const turnoverScore = Math.min(100, fund.turnoverRate * 50); // 2%为满分
            const volatilityScore = Math.max(0, 100 - fund.volatility * 2); // 低波动高分
            const marketLiquidity = Math.round((turnoverScore * 0.6 + volatilityScore * 0.4));
            
            return { 
                valuationReturn,    // 估值与回报
                operationQuality,   // 运营质量
                financialHealth,    // 财务健康
                assetQuality,       // 资产质量
                growthPotential,    // 成长潜力
                marketLiquidity     // 市场与流动性
            };
        }

        function renderPage() {
            const emptyState = document.getElementById('empty-state');

            }

            emptyState.classList.add('hidden');
            contentArea.classList.remove('hidden');

        }

        // 渲染雷达图
        function renderRadarChart() {
            const dom = document.getElementById('radar-chart');
            if (!dom) return;
            if (typeof echarts === 'undefined') {
                dom.innerHTML = '<div class="flex items-center justify-center h-full text-gray-400 text-sm">图表库加载中，请刷新重试</div>';
                return;
            }
            try {
                if (radarChartInstance) {
                    radarChartInstance.dispose();
                }
                radarChartInstance = echarts.init(dom);

                const colors = ['#3b82f6', '#22c55e', '#8b5cf6', '#f97316'];
                const seriesData = compareList.map((item, idx) => {
                    const fund = getFundData(item.code);
                    if (!fund) return null;
                    const dims = calculateDimensions(fund);
                    return {
                        name: fund.name,
                        value: [dims.valuationReturn, dims.operationQuality, dims.financialHealth, dims.assetQuality, dims.growthPotential, dims.marketLiquidity],
                        areaStyle: { opacity: 0.15 },
                        lineStyle: { color: colors[idx % colors.length], width: 2 },
                        itemStyle: { color: colors[idx % colors.length] }
                    };
                }).filter(Boolean);

                if (seriesData.length === 0) {
                    dom.innerHTML = '<div class="flex items-center justify-center h-full text-gray-400 text-sm">暂无有效对比数据</div>';
                    return;
                }

                radarChartInstance.setOption({
                radar: {
                    indicator: [
                        { name: '估值与回报', max: 100 },
                        { name: '运营质量', max: 100 },
                        { name: '财务健康', max: 100 },
                        { name: '资产质量', max: 100 },
                        { name: '成长潜力', max: 100 },
                        { name: '市场与流动性', max: 100 }
                    ],
                    shape: 'circle',
                    radius: '65%',
                    name: { textStyle: { fontSize: 12, color: '#64748b', fontWeight: 500 } },
                    splitArea: { areaStyle: { color: ['rgba(59,130,246,0.05)', 'rgba(59,130,246,0.02)'] } },
                    axisLine: { lineStyle: { color: '#e2e8f0' } },
                    splitLine: { lineStyle: { color: '#e2e8f0' } }
                },
                tooltip: { trigger: 'item', backgroundColor: 'rgba(255,255,255,0.95)', borderColor: '#e2e8f0', textStyle: { color: '#1f2937' } },
                legend: { data: seriesData.map(s => s.name), bottom: 0, icon: 'circle', itemGap: 20, textStyle: { color: '#475569' } },
                series: [{ type: 'radar', data: seriesData }]
            });

                window.addEventListener('resize', () => radarChartInstance && radarChartInstance.resize());
            } catch (err) {
                console.error('雷达图渲染失败:', err);
                dom.innerHTML = '<div class="flex items-center justify-center h-full text-gray-400 text-sm">图表渲染失败</div>';
            }
        }

        // 渲染对比表格
        function renderCompareTable() {
            const funds = compareList.map(item => getFundData(item.code)).filter(f => f);
            const thead = document.getElementById('table-header');
            const tbody = document.getElementById('table-body');

            thead.innerHTML = `
                <tr>
                    <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider bg-gray-50 sticky left-0 z-10">指标</th>
                    ${funds.map(f => `
                        <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider bg-gray-50 min-w-[120px]">
                            <div class="text-gray-900 font-medium">${f.name}</div>
                            <div class="text-gray-400 mono font-normal mt-0.5">${f.code}</div>
                        </th>
                    `).join('')}
                </tr>
            `;

            // 15项专业指标体系（按P0/P1/P2优先级分组）
            const metrics = [
                // ===== P0 核心指标 =====
                { label: '资产类型', key: 'propertyType', format: v => v || '--', higherBetter: false, numeric: false, group: 'P0' },
                { label: '现金分派率(TTM)', key: 'yield', format: v => `${v.toFixed(2)}%`, higherBetter: true, numeric: true, group: 'P0', unit: '%' },
                { label: 'P/NAV', key: 'pNav', format: v => v.toFixed(2), higherBetter: false, numeric: true, group: 'P0', ideal: 1.0 },
                { label: '隐含资本化率', key: 'capRate', format: v => `${v.toFixed(2)}%`, higherBetter: true, numeric: true, group: 'P0', unit: '%' },
                { label: '出租率/车流量', key: 'occupancyRate', altKey: 'trafficVolume', format: (v, f) => f.occupancyRate ? `${f.occupancyRate.toFixed(1)}%` : f.trafficVolume ? `${(f.trafficVolume/10000).toFixed(1)}万辆` : '--', higherBetter: true, numeric: true, group: 'P0', unit: '%' },
                { label: 'WALE/剩余年限', key: 'wale', altKey: 'remainingYearsNum', format: (v, f) => f.wale ? `${f.wale.toFixed(1)}年` : f.remainingYearsNum === 99 ? '永久' : `${f.remainingYearsNum.toFixed(1)}年`, higherBetter: true, numeric: true, group: 'P0' },
                { label: '利息覆盖倍数', key: 'interestCover', format: v => `${v.toFixed(1)}倍`, higherBetter: true, numeric: true, group: 'P0' },
                
                // ===== P1 重要指标 =====
                { label: 'IRR(经营权)', key: 'irr', format: v => v ? `${v.toFixed(1)}%` : 'N/A', higherBetter: true, numeric: true, group: 'P1', unit: '%' },
                { label: '真实分派率', key: 'realYield', format: v => `${v.toFixed(2)}%`, higherBetter: true, numeric: true, group: 'P1', unit: '%' },
                { label: '扩募能力评分', key: 'expansionScore', format: v => `${v}分`, higherBetter: true, numeric: true, group: 'P1' },
                { label: '日均换手率', key: 'turnoverRate', format: v => `${v.toFixed(2)}%`, higherBetter: true, numeric: true, group: 'P1', unit: '%' },
                { label: '年化波动率', key: 'volatility', format: v => `${v.toFixed(1)}%`, higherBetter: false, numeric: true, group: 'P1', unit: '%' },
                
                // ===== P2 辅助指标 =====
                { label: '租金收缴率', key: 'rentCollectionRate', format: v => v ? `${v.toFixed(1)}%` : 'N/A', higherBetter: true, numeric: true, group: 'P2', unit: '%' },
                { label: '租户集中度(Top5)', key: 'tenantConcentration', format: v => v ? `${v.toFixed(1)}%` : 'N/A', higherBetter: false, numeric: true, group: 'P2', unit: '%' },
                { label: '浮动利率债务占比', key: 'floatDebtRatio', format: v => `${v.toFixed(1)}%`, higherBetter: false, numeric: true, group: 'P2', unit: '%' }
            ];

            // 计算最优/最差（支持altKey）
            const bestValues = {};
            const worstValues = {};
            metrics.forEach(m => {
                if (!m.numeric) return;
                const values = funds.map(f => {
                    let v = f[m.key];
                    if (v === null && m.altKey) v = f[m.altKey];
                    return v;
                }).filter(v => typeof v === 'number');
                if (values.length > 0) {
                    bestValues[m.key] = m.higherBetter ? Math.max(...values) : Math.min(...values);
                    worstValues[m.key] = m.higherBetter ? Math.min(...values) : Math.max(...values);
                }
            });

            tbody.innerHTML = metrics.map(metric => {
                const cells = funds.map(fund => {
                    let val = fund[metric.key];
                    if (val === null && metric.altKey) val = fund[metric.altKey];
                    const formatted = metric.format.length === 2 ? metric.format(val, fund) : metric.format(val);
                    let cls = '';
                    let extra = '';

                    if (highlightBest && metric.numeric && typeof val === 'number') {
                        if (val === bestValues[metric.key]) {
                            cls = 'highlight-best';
                            extra = '<span class="trophy">🏆</span>';
                        } else if (val === worstValues[metric.key]) {
                            cls = 'highlight-worst';
                        }
                    }

                    return `<td class="px-4 py-3 text-center text-sm text-gray-700 ${cls} mono">${formatted}${extra}</td>`;
                }).join('');

                // 根据优先级显示不同背景色
                const groupBg = metric.group === 'P0' ? 'bg-blue-50/50' : metric.group === 'P1' ? 'bg-gray-50' : 'bg-gray-50/50';
                const groupBorder = metric.group === 'P0' ? 'border-l-2 border-l-blue-400' : metric.group === 'P1' ? 'border-l-2 border-l-gray-300' : 'border-l-2 border-l-gray-200';

                return `
                    <tr class="hover:bg-gray-50 transition-colors ${groupBg} ${groupBorder}">
                        <td class="px-4 py-3 text-sm font-semibold text-gray-700 bg-gray-50 sticky left-0 z-10">
                            <span class="inline-flex items-center gap-2">
                                <span class="text-[10px] px-1.5 py-0.5 rounded ${metric.group === 'P0' ? 'bg-blue-100 text-blue-700' : metric.group === 'P1' ? 'bg-gray-200 text-gray-700' : 'bg-gray-100 text-gray-600'}">${metric.group}</span>
                                ${metric.label}
                            </span>
                        </td>
                        ${cells}
                    </tr>
                `;
            }).join('');
        }

        // 搜索基金
        function searchFunds(keyword) {
            if (!keyword || typeof ALL_FUNDS === 'undefined') return [];
            const kw = keyword.toLowerCase();
            return ALL_FUNDS.filter(f => f.code.toLowerCase().includes(kw) || f.name.toLowerCase().includes(kw)).slice(0, 10);
        }

        function renderSearchResults(results) {
            const container = document.getElementById('search-results');
            if (!results.length) {
                container.classList.add('hidden');
                return;
            }

            container.innerHTML = results.map(f => {
                const sectorClass = (typeof SECTOR_CONFIG !== 'undefined' && SECTOR_CONFIG[f.sector]?.tagClass) || 'bg-gray-100 text-gray-600';
                return `
                    <div onclick="addToCompare('${f.code}', '${f.name?.replace(/'/g, '\\\'')}')" class="px-4 py-2.5 hover:bg-gray-50 cursor-pointer flex justify-between items-center border-b border-gray-100 last:border-0 transition-colors">
                        <div class="flex items-center gap-2">
                            <span class="mono text-blue-600 text-sm font-medium">${f.code}</span>
                            <span class="text-gray-700 text-sm">${f.name}</span>
                        </div>
                        <span class="sector-tag ${sectorClass} text-xs">${f.sectorName}</span>
                    </div>
                `;
            }).join('');
            container.classList.remove('hidden');
        }

        // 交互操作
        function addToCompare(code, name) {
            if (compareList.find(i => i.code === code)) {
                REITS.showToast('该基金已在对比栏中', 'warning');
                clearSearch();
                return;
            }
            if (compareList.length >= 4) {
                REITS.showToast('最多只能对比4只基金', 'warning');
                clearSearch();
                return;
            }
            // 如果当前只有默认示例基金，自动清除它们
            const hasDefaults = compareList.some(i => i.isDefault);
            const hasUserAdded = compareList.some(i => !i.isDefault);
            if (hasDefaults && !hasUserAdded) {
                compareList = [];
            }
            compareList.push({ code, name });
            saveCompareList();
            renderPage();
            clearSearch();
            REITS.showToast(`已添加 ${name}`, 'success');
        }

        function removeFromCompare(code) {
            const item = compareList.find(i => i.code === code);
            compareList = compareList.filter(i => i.code !== code);
            saveCompareList();
            renderPage();
            if (item) REITS.showToast(`已移除 ${item.name}`, 'info');
        }

        function focusSearch() {
            const input = document.getElementById('compare-search');
            input.focus();
            REITS.showToast('请在上方搜索框输入基金代码或名称', 'info');
        }

        function clearSearch() {
            const input = document.getElementById('compare-search');
            const results = document.getElementById('search-results');
            input.value = '';
            results.classList.add('hidden');
        }

        // 高亮最优
        function toggleHighlight() {
            highlightBest = !highlightBest;
            const btn = document.getElementById('highlight-best-btn');
            if (highlightBest) {
                btn.classList.add('ring-2', 'ring-yellow-300', 'bg-yellow-200');
                REITS.showToast('已高亮最优指标', 'success');
            } else {
                btn.classList.remove('ring-2', 'ring-yellow-300', 'bg-yellow-200');
            }
            renderCompareTable();
        }

        function resetHighlight() {
            highlightBest = false;
            document.getElementById('highlight-best-btn').classList.remove('ring-2', 'ring-yellow-300', 'bg-yellow-200');
            renderCompareTable();
            REITS.showToast('已重置高亮', 'info');
        }

        // 导出
        function exportToExcel() {
            if (compareList.length === 0) {
                REITS.showToast('暂无对比数据', 'warning');
                return;
            }
            const funds = compareList.map(item => getFundData(item.code)).filter(f => f);
            const headers = ['指标', '优先级', ...funds.map(f => `${f.name}(${f.code})`)];
            
            // P0 核心指标
            const p0Rows = [
                ['资产类型', 'P0-基础', ...funds.map(f => f.propertyType || '--')],
                ['现金分派率(TTM)', 'P0-估值', ...funds.map(f => f.yield.toFixed(2) + '%')],
                ['P/NAV', 'P0-估值', ...funds.map(f => f.pNav.toFixed(2))],
                ['隐含资本化率', 'P0-估值', ...funds.map(f => f.capRate.toFixed(2) + '%')],
                ['出租率/车流量', 'P0-运营', ...funds.map(f => f.occupancyRate ? f.occupancyRate.toFixed(1) + '%' : f.trafficVolume ? (f.trafficVolume/10000).toFixed(1) + '万辆' : '--')],
                ['WALE/剩余年限', 'P0-运营', ...funds.map(f => f.wale ? f.wale.toFixed(1) + '年' : f.remainingYearsNum === 99 ? '永久' : f.remainingYearsNum.toFixed(1) + '年')],
                ['利息覆盖倍数', 'P0-财务', ...funds.map(f => f.interestCover.toFixed(1) + '倍')]
            ];
            
            // P1 重要指标
            const p1Rows = [
                ['IRR(经营权)', 'P1-回报', ...funds.map(f => f.irr ? f.irr.toFixed(1) + '%' : 'N/A')],
                ['真实分派率', 'P1-回报', ...funds.map(f => f.realYield.toFixed(2) + '%')],
                ['扩募能力评分', 'P1-成长', ...funds.map(f => f.expansionScore + '分')],
                ['日均换手率', 'P1-市场', ...funds.map(f => f.turnoverRate.toFixed(2) + '%')],
                ['年化波动率', 'P1-市场', ...funds.map(f => f.volatility.toFixed(1) + '%')]
            ];
            
            // P2 辅助指标
            const p2Rows = [
                ['租金收缴率', 'P2-运营', ...funds.map(f => f.rentCollectionRate ? f.rentCollectionRate.toFixed(1) + '%' : 'N/A')],
                ['租户集中度(Top5)', 'P2-资产', ...funds.map(f => f.tenantConcentration ? f.tenantConcentration.toFixed(1) + '%' : 'N/A')],
                ['浮动利率债务占比', 'P2-财务', ...funds.map(f => f.floatDebtRatio.toFixed(1) + '%')]
            ];
            
            const rows = [...p0Rows, ...p1Rows, ...p2Rows];
            const wsData = [headers, ...rows];
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'REITs专业指标对比');
            XLSX.writeFile(wb, `REITs专业指标对比_${new Date().toISOString().slice(0,10)}.xlsx`);
            REITS.showToast('Excel导出成功', 'success');
        }

        function exportToPDF() {
            if (compareList.length === 0) {
                REITS.showToast('暂无对比数据', 'warning');
                return;
            }
            window.print();
            REITS.showToast('已唤起打印/PDF导出', 'info');
        }

        // 事件绑定
        function bindEvents() {
            const searchInput = document.getElementById('compare-search');
            const resultsContainer = document.getElementById('search-results');

            searchInput.addEventListener('input', debounce((e) => {
                const keyword = e.target.value.trim();
                if (keyword) {
                    const results = searchFunds(keyword);
                    renderSearchResults(results);
                } else {
                    resultsContainer.classList.add('hidden');
                }
            }, 300));

            // 点击外部隐藏搜索结果
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#compare-search') && !e.target.closest('#search-results')) {
                    resultsContainer.classList.add('hidden');
                }
            });

            document.getElementById('highlight-best-btn').addEventListener('click', toggleHighlight);
            document.getElementById('reset-highlight-btn').addEventListener('click', resetHighlight);
            document.getElementById('export-excel-btn').addEventListener('click', exportToExcel);
            document.getElementById('export-pdf-btn').addEventListener('click', exportToPDF);

            // 监听storage变化（多标签页同步）
            window.addEventListener('storage', (e) => {
                if (e.key === 'compareList') {
                    loadCompareList();
                }
            });
        }

        // 启动
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
