version: '3.8'

services:
  reits-platform:
    build: .
    container_name: reits-platform
    ports:
      - "3001:3001"
    volumes:
      - ./backend/database:/app/backend/database
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
